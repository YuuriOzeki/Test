<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Desktop Window - Head Tracking</title>
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --accent-color: #00e5ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--primary-bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 8px;
            color: white;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        button {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        #debug-video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: black;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
            background: var(--glass-bg);
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
        }

        #eye-viz {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #ff0055;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Debug only */
        }

        .hidden {
            display: none !important;
        }

        /* Loading Animation */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading MediaPipe & Models...</p>
    </div>

    <div id="container">
        <div id="ui-overlay">
            <div class="glass-panel">
                <h1>Calibration</h1>
                <div class="input-group">
                    <label>Monitor Width (cm)</label>
                    <input type="number" id="monitor-width" value="53" step="0.1">
                </div>
                <div class="input-group">
                    <label>Camera Offset from Top (cm)</label>
                    <input type="number" id="camera-offset" value="0" step="0.1">
                </div>
                <div class="input-group">
                    <label>Face to Eye Offset (cm)</label>
                    <input type="number" id="eye-offset" value="4" step="0.1">
                </div>
                <button id="start-btn">Start Camera</button>
            </div>
            
            <div class="glass-panel" id="instruction-panel">
                <p style="font-size: 0.85rem; margin: 0; line-height: 1.4;">
                    1. モニター自身の横幅を測って入力してください。<br>
                    2. カメラをモニターの上中央に配置してください。<br>
                    3. Startを押して顔をトラッキングします。
                </p>
            </div>
        </div>

        <div id="status">Initializing...</div>

        <div id="debug-video-container">
            <video id="video" playsinline></video>
        </div>
    </div>

    <!-- Scripts -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import {
            FaceLandmarker,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        // Constants & Config
        const VIDEO_WIDTH = 640;
        const VIDEO_HEIGHT = 480;
        const DEFAULT_EYE_DIST_CM = 6.3; // Average pupillary distance
        
        // State
        let faceLandmarker;
        let webcamRunning = false;
        let lastVideoTime = -1;
        
        let screenWidthCm = 53;
        let cameraOffsetTopCm = 0;
        let eyeOffsetCm = 4;
        
        let currentHeadPos = { x: 0, y: 0, z: 60 }; // Initial guess: center, 60cm away
        
        // Elements
        const video = document.getElementById("video");
        const startBtn = document.getElementById("start-btn");
        const loader = document.getElementById("loader");
        const statusEl = document.getElementById("status");
        
        function updateStatus(msg, isError = false) {
            statusEl.innerText = msg;
            if (isError) {
                statusEl.style.color = "#ff4444";
                console.error("[3DViewer Error]", msg);
            } else {
                statusEl.style.color = "white";
                console.log("[3DViewer]", msg);
            }
        }

        // ------------------------------------------------------------------
        // Three.js Setup
        // ------------------------------------------------------------------
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById("container").appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);

        // Off-axis Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00e5ff, 100, 100);
        pointLight.position.set(0, 0, 10);
        scene.add(pointLight);

        function createRoom() {
            const roomGroup = new THREE.Group();
            
            const wallWidth = 100;
            const wallHeight = 100;
            const corridorDepth = 1000;

            const material = new THREE.MeshPhongMaterial({
                color: 0x050505,
                specular: 0x111111,
                shininess: 100,
                side: THREE.DoubleSide
            });

            // Corridor construction
            const top = new THREE.Mesh(new THREE.PlaneGeometry(wallWidth, corridorDepth), material);
            top.rotation.x = Math.PI / 2;
            top.position.y = wallHeight / 2;
            top.position.z = -corridorDepth / 2;
            roomGroup.add(top);

            const bottom = new THREE.Mesh(new THREE.PlaneGeometry(wallWidth, corridorDepth), material);
            bottom.rotation.x = -Math.PI / 2;
            bottom.position.y = -wallHeight / 2;
            bottom.position.z = -corridorDepth / 2;
            roomGroup.add(bottom);

            const left = new THREE.Mesh(new THREE.PlaneGeometry(wallHeight, corridorDepth), material);
            left.rotation.y = Math.PI / 2;
            left.position.x = -wallWidth / 2;
            left.position.z = -corridorDepth / 2;
            roomGroup.add(left);

            const right = new THREE.Mesh(new THREE.PlaneGeometry(wallHeight, corridorDepth), material);
            right.rotation.y = -Math.PI / 2;
            right.position.x = wallWidth / 2;
            right.position.z = -corridorDepth / 2;
            roomGroup.add(right);

            // Add glowing grid lines
            const gridCount = 20;
            const step = corridorDepth / gridCount;
            for (let i = 0; i < gridCount; i++) {
                const z = -i * step;
                const rectGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-wallWidth/2, -wallHeight/2, z),
                    new THREE.Vector3(wallWidth/2, -wallHeight/2, z),
                    new THREE.Vector3(wallWidth/2, wallHeight/2, z),
                    new THREE.Vector3(-wallWidth/2, wallHeight/2, z),
                    new THREE.Vector3(-wallWidth/2, -wallHeight/2, z)
                ]);
                const rectLine = new THREE.Line(rectGeo, new THREE.LineBasicMaterial({
                    color: 0x00e5ff,
                    transparent: true,
                    opacity: 0.5 - (i / gridCount) * 0.5
                }));
                roomGroup.add(rectLine);
            }

            // Distant objects
            for (let i = 0; i < 50; i++) {
                const size = Math.random() * 5 + 1;
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(size, size, size),
                    new THREE.MeshStandardMaterial({
                        color: Math.random() > 0.5 ? 0x00e5ff : 0x7000ff,
                        emissive: Math.random() > 0.5 ? 0x00e5ff : 0x7000ff,
                        emissiveIntensity: 2
                    })
                );
                cube.position.set(
                    (Math.random() - 0.5) * wallWidth * 0.8,
                    (Math.random() - 0.5) * wallHeight * 0.8,
                    -Math.random() * corridorDepth
                );
                roomGroup.add(cube);
            }

            // End of corridor
            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(wallWidth, wallHeight), material);
            backWall.position.z = -corridorDepth;
            roomGroup.add(backWall);

            scene.add(roomGroup);
        }
        createRoom();

        // ------------------------------------------------------------------
        // MediaPipe setup
        // ------------------------------------------------------------------
        async function initMediaPipe() {
            try {
                updateStatus("Loading MediaPipe...");
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                loader.classList.add("hidden");
                updateStatus("Ready. Press Start.");
            } catch (err) {
                updateStatus("Initialization Failed: " + err.message, true);
                loader.innerHTML = `<div style="text-align:center; padding: 20px;">
                    <h2 style="color:#ff4444">Initialization Failed</h2>
                    <p>${err.message}</p>
                    <p style="font-size:0.8rem; opacity:0.7">Please ensure you have an active internet connection and are using a modern browser.</p>
                </div>`;
            }
        }

        // ------------------------------------------------------------------
        // Head Tracking & Math
        // ------------------------------------------------------------------
        function estimateHeadPosition(landmarks) {
            const nose = landmarks[4];
            const leftEye = landmarks[33];
            const rightEye = landmarks[263];

            const dx = rightEye.x - leftEye.x;
            const dy = rightEye.y - leftEye.y;
            const dz = rightEye.z - leftEye.z;
            const distPx = Math.sqrt(dx*dx + dy*dy + dz*dz) * VIDEO_WIDTH;

            const focalLengthPx = VIDEO_WIDTH * 1.0; // Slightly adjusted focal length estimate
            const zCm = (DEFAULT_EYE_DIST_CM * focalLengthPx) / distPx;
            const xCm = ((nose.x - 0.5) * VIDEO_WIDTH * zCm) / focalLengthPx;
            const yCm = ((nose.y - 0.5) * VIDEO_HEIGHT * zCm) / focalLengthPx;

            return {
                x: -xCm,
                y: -yCm + cameraOffsetTopCm - eyeOffsetCm,
                z: zCm
            };
        }

        function updateProjection(head) {
            const width = screenWidthCm;
            const height = width * (window.innerHeight / window.innerWidth);
            
            const L = -width / 2;
            const R = width / 2;
            const T = height / 2;
            const B = -height / 2;

            const x = head.x;
            const y = head.y;
            const z = head.z;

            const n = 1.0; 
            const f = 5000.0;
            const s = n / z;

            const left = (L - x) * s;
            const right = (R - x) * s;
            const bottom = (B - y) * s;
            const top = (T - y) * s;

            camera.position.set(x, y, z);
            camera.projectionMatrix.makePerspective(left, right, top, bottom, n, f);
            camera.updateMatrixWorld();
            camera.lookAt(x, y, 0); 
        }

        // ------------------------------------------------------------------
        // Loop & Events
        // ------------------------------------------------------------------
        function animate() {
            if (webcamRunning) {
                let startTimeMs = performance.now();
                if (video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    try {
                        const results = faceLandmarker.detectForVideo(video, startTimeMs);
                        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                            const landmarks = results.faceLandmarks[0];
                            currentHeadPos = estimateHeadPosition(landmarks);
                            updateStatus(`Tracking: ${currentHeadPos.z.toFixed(0)}cm away`);
                        } else {
                            updateStatus("No face detected");
                        }
                    } catch (err) {
                        console.warn("Detection error:", err);
                    }
                }
            }

            updateProjection(currentHeadPos);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        async function startCamera() {
            try {
                if (!faceLandmarker) {
                    throw new Error("FaceLandmarker is still initializing. Please wait.");
                }

                updateStatus("Requesting Camera Permission...");
                
                // 最もシンプルな制約から開始
                const constraints = {
                    video: true
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // ブラウザによっては play() が明示的に必要
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        webcamRunning = true;
                        startBtn.innerText = "Camera Active";
                        startBtn.disabled = true;
                        
                        // 設定値の読み込み
                        screenWidthCm = parseFloat(document.getElementById("monitor-width").value) || 53;
                        cameraOffsetTopCm = parseFloat(document.getElementById("camera-offset").value) || 0;
                        eyeOffsetCm = parseFloat(document.getElementById("eye-offset").value) || 4;
                        
                        updateStatus("Tracking started.");
                    }).catch(e => {
                        updateStatus("Video play error: " + e.message, true);
                    });
                };
            } catch (err) {
                updateStatus("Camera Access Error: " + err.message, true);
                if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
                    alert("カメラの使用許可が拒否されました。ブラウザのアドレスバーにあるカメラアイコンをチェックして、許可設定を確認してください。");
                } else {
                    alert("カメラの起動に失敗しました: " + err.message);
                }
            }
        }

        startBtn.addEventListener("click", startCamera);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        initMediaPipe();
        animate();
    </script>
</body>
</html>
